version: '3.8'

services:
  # PostGIS - Vector data storage (plots, hotspots, features)
  postgis:
    image: postgis/postgis:15-3.3
    container_name: geoai-postgis
    environment:
      POSTGRES_DB: geoai
      POSTGRES_USER: satellite
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satellite -d geoai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible object storage (COG files, raw data)
  minio:
    image: minio/minio
    container_name: geoai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web Console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
